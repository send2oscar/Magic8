version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shirt-changer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_secure_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shirt_changer}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - shirt-changer-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shirt-changer-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-your_secure_password}@mysql:3306/${MYSQL_DATABASE:-shirt_changer}
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-your_admin_session_secret_here}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-https://oauth.manus.im}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Shirt Changer}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-your_admin_password}
      OWNER_NAME: ${OWNER_NAME:-Oscar}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-https://api.manus.im}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-https://api.manus.im}
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - shirt-changer-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: shirt-changer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - shirt-changer-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  shirt-changer-network:
    driver: bridge
